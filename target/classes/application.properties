spring.application.name=acebank

# Render injects PORT dynamically; fallback to 8081 for local dev
server.port=${PORT:8081}

# View Resolver - JSPs are in META-INF/resources/WEB-INF/views/ inside the JAR
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Disable Spring Boot's auto-configured DataSource (project uses its own ConnectionManager)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration

